# =============================================================
# ProdSync — Stack completo
#
# Requisitos:
#   - Docker Desktop instalado y en ejecución
#   - Archivo .env en la raíz con ANTHROPIC_API_KEY (ver .env.example)
#
# Uso:
#   docker compose up --build      → primera vez (compila todo)
#   docker compose up              → arrancar sin recompilar
#   docker compose down            → parar
#   docker compose down -v         → parar y borrar datos de la BD
#
# Acceso:
#   Frontend  → http://localhost:3000
#   Backend   → http://localhost:8080
#
# Credenciales (contraseña: password123):
#   admin@test.com     → ADMIN    (acceso total)
#   operator@test.com  → OPERATOR (clientes y proyectos)
#   user@test.com      → USER     (consulta y registro de tiempo)
# =============================================================

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prodsyncdb
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./prodsync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/prodsyncdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --server-response http://localhost:8080/api/auth/login 2>&1 | grep -q 'HTTP/'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  seed:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./prodsync-frontend/scripts/seed-users.mjs:/app/scripts/seed-users.mjs:ro
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    command: node scripts/seed-users.mjs
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./prodsync-frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

volumes:
  db_data:
