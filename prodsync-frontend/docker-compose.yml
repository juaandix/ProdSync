# =============================================================
# docker-compose.yml (frontend)
# Orquesta el stack completo: DB + Backend + seed automático.
#
# Uso:
#   docker compose up -d --build   → levanta todo (primera vez)
#   docker compose up -d           → levanta sin recompilar
#   docker compose down -v         → para y elimina volúmenes
#
# Credenciales creadas automáticamente (contraseña: password123):
#   admin@test.com    → rol ADMIN    (creado por el backend al arrancar)
#   operator@test.com → rol OPERATOR (creado por el servicio seed)
#   user@test.com     → rol USER     (creado por el servicio seed)
# =============================================================

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prodsyncdb
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../prodsync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/prodsyncdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/login --post-data='{\"username\":\"x\",\"password\":\"x\"}' --header='Content-Type:application/json' || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  seed:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts/seed-users.mjs:/app/scripts/seed-users.mjs:ro
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    command: node scripts/seed-users.mjs
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

volumes:
  db_data:
